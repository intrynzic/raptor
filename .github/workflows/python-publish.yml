name: Publish Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-26-intel
            arch: x86_64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: AMD64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

        # NOTE: PyPI doesn't accept plain linux_aarch64 - Linux wheels must use the manylinux or musllinux platform tags to be accepted.
      - name: Build Linux wheels (manylinux)
        if: runner.os == 'Linux'
        uses: pypa/cibuildwheel@v3.4.1
        with:
          output-dir: dist
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: "cp313-manylinux*"

      - name: Setup uv (non-Linux)
        if: runner.os != 'Linux'
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          working-directory: "."
          enable-cache: true
          cache-dependency-glob: |
            **/*requirements*.txt
            **/*requirements*.in
            **/*constraints*.txt
            **/*constraints*.in
            **/pyproject.toml
            **/uv.lock
            **/*.py.lock

      - name: Build release distributions (non-Linux)
        if: runner.os != 'Linux'
        run: uv build --wheel

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      url: https://pypi.org/project/intrynzic-raptor/
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      # url: https://pypi.org/p/YOURPROJECT
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          pattern: release-dists-*
          merge-multiple: true
          path: dist/

      - name: Verify distributions
        run: ls -lh dist

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
